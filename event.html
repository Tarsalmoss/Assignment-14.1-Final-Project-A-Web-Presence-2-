<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Handling</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            text-align: center;
        }

        #container {
            position: relative;
            width: 80%;
            height: 400px;
            margin: 20px auto;
            border: 3px solid white;
            overflow: hidden;
            background-color: #111827;
        }

        #ball {
            width: 50px;
            height: 50px;
            background: cyan;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Event Handling - Bouncing Ball</h1>
</header>

<nav>
    <h2>Navigation</h2>
    <a href="./index.html">Home</a><br>
    <a href="./boards.html">Boards</a><br>
    <a href="./dice.html">Dice Game</a><br>
    <a href="./event.html">Event Handling</a><br>
    <a href="./table.html">Table</a><br>
</nav>

<main>

    <h2>Click Start to Bounce the Ball</h2>

    <button onclick="startBounce()">Start</button>
    <button onclick="stopBounce()">Stop</button>

    <div id="container">
        <div id="ball"></div>
    </div>

</main>

<footer>
    Ian Andalon<br>
    University of Advancing Technology<br>
    2625 W Baseline Rd<br>
    Tempe, AZ 85283<br>
</footer>

<script>
let interval;
let x = 0;
let y = 0;
let dx = 3;
let dy = 3;

function startBounce() {
    const ball = document.getElementById("ball");
    const container = document.getElementById("container");

    const maxX = container.clientWidth - ball.offsetWidth;
    const maxY = container.clientHeight - ball.offsetHeight;

    clearInterval(interval);

    interval = setInterval(() => {

        x += dx;
        y += dy;

        // bounce off left/right walls
        if (x <= 0 || x >= maxX) {
            dx = -dx;
        }

        // bounce off top/bottom walls
        if (y <= 0 || y >= maxY) {
            dy = -dy;
        }

        ball.style.left = x + "px";
        ball.style.top = y + "px";

    }, 15);
}

function stopBounce() {
    clearInterval(interval);
}
</script>

</body>
</html>
