<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Handling</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        /* keeps the animation contained nicely */
        #container {
            position: relative;
            width: 100%;
            height: 300px;
            border: 2px solid white;
            margin-top: 20px;
            overflow: hidden;
        }

        #ball {
            width: 50px;
            height: 50px;
            background: cyan;
            border-radius: 50%;
            position: absolute;
        }

        button {
            margin: 5px;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Event Handling Project</h1>
</header>

<nav>
    <h2>Navigation</h2>
    <a href="./index.html">Home</a><br>
    <a href="./boards.html">Boards</a><br>
    <a href="./dice.html">Dice Game</a><br>
    <a href="./event.html">Event Handling</a><br>
    <a href="./table.html">Table</a><br>
</nav>

<main>

    <h2>Bouncing Circle Animation</h2>

    <button onclick="startBounce()">Start</button>
    <button onclick="stopBounce()">Stop</button>

    <div id="container">
        <div id="ball"></div>
    </div>

</main>

<footer>
    Ian Andalon<br>
    University of Advancing Technology<br>
    2625 W Baseline Rd<br>
    Tempe, AZ 85283<br>
</footer>

<script>
let interval;
let x = 0;
let y = 0;
let dx = 3;
let dy = 3;

function startBounce() {
    const ball = document.getElementById("ball");
    const container = document.getElementById("container");

    const maxX = container.clientWidth - 50;
    const maxY = container.clientHeight - 50;

    // prevent multiple intervals stacking
    clearInterval(interval);

    interval = setInterval(() => {
        x += dx;
        y += dy;

        if (x <= 0 || x >= maxX) {
            dx *= -1;
        }

        if (y <= 0 || y >= maxY) {
            dy *= -1;
        }

        ball.style.left = x + "px";
        ball.style.top = y + "px";
    }, 20);
}

function stopBounce() {
    clearInterval(interval);
}
</script>

</body>
</html>
